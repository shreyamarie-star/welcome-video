<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APOS Welcome</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #1e0E4B;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <video id="vid" loop muted playsinline preload="auto">
    <source src="apos_welcome.mp4" type="video/mp4" />
  </video>
  <script>
    const vid = document.getElementById('vid');

    // Try to autoplay immediately
    function tryPlay() {
      vid.play().catch(() => {});
    }

    // Attempt on load
    vid.addEventListener('canplaythrough', tryPlay);
    tryPlay();

    // Fallback: play on any user interaction with the page or parent frame
    ['click', 'touchstart', 'pointerdown', 'keydown', 'scroll'].forEach(e => {
      document.addEventListener(e, tryPlay, { once: true });
      window.addEventListener(e, tryPlay, { once: true });
    });

    // Also listen for visibility change (Brella may hide/show the iframe)
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) tryPlay();
    });
  </script>
</body>
</html>
