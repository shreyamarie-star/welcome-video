<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APOS Welcome</title>
  <style>
    @font-face {
      font-family: 'Aileron';
      src: url('Aileron-Bold.otf') format('opentype');
      font-weight: 700;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #450D8C;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2vh;
    }

    .welcome {
      font-family: 'Aileron', sans-serif;
      font-weight: 700;
      font-size: clamp(28px, 4vw, 72px);
      color: #ffffff;
      opacity: 0;
      animation: fadeIn 1.2s ease-in-out 1s forwards;
    }

    .logo {
      width: clamp(200px, 45%, 520px);
      opacity: 0;
      animation: fadeIn 1.2s ease-in-out 2.5s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="welcome">Welcome To</div>
  <img class="logo" src="apos_logo.png" alt="APOS" />
</body>
</html>
