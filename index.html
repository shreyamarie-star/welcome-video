<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APOS Welcome</title>
  <style>
    @font-face {
      font-family: 'Aileron';
      src: url('Aileron-Bold.otf') format('opentype');
      font-weight: 700;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #671f75 0%, #3A0443 40%, #1e0e4B 100%);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5vh;
    }

    .welcome {
      font-family: 'Aileron', sans-serif;
      font-weight: 700;
      font-size: clamp(18px, 2.4vw, 44px);
      color: #ffffff;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeIn 1.2s ease-in-out 1s forwards;
    }

    .logo {
      width: clamp(160px, 38%, 440px);
      opacity: 0;
      animation: fadeIn 1.2s ease-in-out 2.5s forwards;
    }

    .year {
      font-family: 'Aileron', sans-serif;
      font-weight: 700;
      font-size: clamp(16px, 2vw, 36px);
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: 0.2em;
      opacity: 0;
      animation: fadeIn 1.2s ease-in-out 3.3s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="welcome">Welcome To</div>
  <img class="logo" src="apos_logo.png" alt="APOS" />
  <div class="year">2026</div>
</body>
</html>
